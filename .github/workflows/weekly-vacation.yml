name: Weekly Vacation Notifier

on:
  schedule:
    # 평일(월~금) 08:00 KST = 일~목 23:00 UTC
    - cron: "0 23 * * 0-4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without posting to Slack"
        required: false
        default: "false"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - name: Post weekly vacation summary
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SOURCE_CHANNEL_ID: ${{ secrets.SLACK_SOURCE_CHANNEL_ID }}
          SLACK_TARGET_CHANNEL_ID: ${{ secrets.SLACK_TARGET_CHANNEL_ID }}
          SLACK_USER_GROUP_ID: ${{ secrets.SLACK_USER_GROUP_ID }}
          SLACK_EXTRA_USER_IDS: "U07CL33TFM0,U093LTKREH0"
          DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '' }}
        run: npm start
